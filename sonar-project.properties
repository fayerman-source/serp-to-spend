# SonarCloud analysis configuration.
#
# Exclude the compliance knowledge modules from duplication (copy-paste)
# detection. Each module under lib/knowledge/ is declarative reference data:
# a list of legal citations that share a { label, citation, url } shape. The
# copy-paste detector reads that repeated shape as "duplication," which is
# noise for data of this kind (there is no logic to factor out).
#
# These files are still fully analyzed for issues, bugs, and security; only
# duplication detection is excluded.
sonar.cpd.exclusions=lib/knowledge/**
